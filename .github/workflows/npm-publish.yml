name: Publish npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin
          git fetch --force origin main:refs/remotes/origin/main

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$' | sort -V | tail -n 1 || true)"
          fi

          if [[ -z "${tag}" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Current commit has no version tag. Skip npm publish."
            exit 0
          fi

          if ! git merge-base --is-ancestor HEAD refs/remotes/origin/main; then
            echo "Tag ${tag} is not on origin/main." >&2
            exit 1
          fi

          version="${tag#v}"
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if [[ "${version}" != "${package_version}" ]]; then
            echo "Tag ${tag} does not match package.json version ${package_version}." >&2
            exit 1
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.release.outputs.publish == 'true'
        run: bun install --frozen-lockfile

      - name: Test
        if: steps.release.outputs.publish == 'true'
        run: bun run test

      - name: Build library
        if: steps.release.outputs.publish == 'true'
        run: bun run build:lib

      - name: Verify npm version is unpublished
        if: steps.release.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail

          package="${{ steps.release.outputs.package_name }}"
          version="${{ steps.release.outputs.version }}"

          if npm view "${package}@${version}" version > /dev/null 2>&1; then
            echo "${package}@${version} already exists on npm." >&2
            exit 1
          fi

      - name: Publish package
        if: steps.release.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
